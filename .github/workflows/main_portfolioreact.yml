# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - PortfolioReact

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read # Required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install pnpm
        run: npm install -g pnpm

      # Build frontend
      - name: Build frontend
        run: |
          cd frontend
          pnpm install
          pnpm run build
          cd ..

      # Copy built frontend into backend
      - name: Copy frontend build into backend
        run: |
          rm -rf backend/dist
          cp -r frontend/dist backend/dist

      # Install backend dependencies (production only)
      - name: Install backend dependencies
        run: |
          cd backend
          pnpm install --prod
          cd ..

      # Upload backend folder only for deploy
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: backend/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write # Required for requesting the JWT
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1A6A67880BE84DC78C3DAEF0BF5A7D4A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9E374DCC0E054ED6846829DE8B4465B5 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2D4FD9DCA90D474DAED92FCA079A4A40 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'PortfolioReact'
          slot-name: 'Production'
          package: .
